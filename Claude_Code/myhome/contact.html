<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ - My Home</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="index.html">My Home</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">ホーム</a></li>
                <li><a href="about.html">自己紹介</a></li>
                <li><a href="blog.html">ブログ</a></li>
                <li><a href="contact.html" class="active">お問い合わせ</a></li>
            </ul>
            <button class="menu-toggle" aria-label="メニュー">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
    </header>

    <main>
        <section class="page-header">
            <h1>お問い合わせ</h1>
            <p>ご質問・ご意見はこちらから</p>
        </section>

        <section class="contact-section">
            <form class="contact-form" action="#" method="post">
                <div class="form-group">
                    <label for="name">お名前</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">メールアドレス</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="subject">件名</label>
                    <input type="text" id="subject" name="subject" required>
                </div>
                <div class="form-group">
                    <label for="message">メッセージ</label>
                    <textarea id="message" name="message" rows="6" required></textarea>
                </div>
                <button type="submit" class="submit-btn">送信する</button>
            </form>
            <p class="form-note">※ このフォームは練習用です。実際には送信されません。</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 My Home. All rights reserved.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
