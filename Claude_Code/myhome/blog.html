<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブログ - My Home</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="index.html">My Home</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">ホーム</a></li>
                <li><a href="about.html">自己紹介</a></li>
                <li><a href="blog.html" class="active">ブログ</a></li>
                <li><a href="projects.html">プロジェクト</a></li>
                <li><a href="contact.html">お問い合わせ</a></li>
            </ul>
            <button class="menu-toggle" aria-label="メニュー">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
    </header>

    <main>
        <section class="page-header">
            <h1>ブログ</h1>
            <p>日々の学びと発見を記録しています</p>
        </section>

        <section class="blog-list" id="blog-list">
            <p class="loading">読み込み中...</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 My Home. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/main.js"></script>
    <script>
        (async () => {
            const list = document.getElementById('blog-list');
            const { data: posts, error } = await db
                .from('posts')
                .select('id, title, date, summary')
                .order('date', { ascending: false });

            if (error || !posts?.length) {
                list.innerHTML = '<p>記事がありません。</p>';
                return;
            }

            list.innerHTML = posts.map(post => `
                <article class="blog-item">
                    <div class="blog-date">${formatDate(post.date)}</div>
                    <h2><a href="blog/post.html#${post.id}">${post.title}</a></h2>
                    <p>${post.summary || ''}</p>
                    <a href="blog/post.html#${post.id}" class="read-more">続きを読む →</a>
                </article>
            `).join('');
        })();
    </script>
</body>
</html>
