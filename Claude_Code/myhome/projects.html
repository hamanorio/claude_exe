<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロジェクト - My Home</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="index.html">My Home</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">ホーム</a></li>
                <li><a href="about.html">自己紹介</a></li>
                <li><a href="blog.html">ブログ</a></li>
                <li><a href="projects.html" class="active">プロジェクト</a></li>
                <li><a href="contact.html">お問い合わせ</a></li>
            </ul>
            <button class="menu-toggle" aria-label="メニュー">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
    </header>

    <main>
        <section class="page-header">
            <h1>プロジェクト</h1>
            <p>進行中のプロジェクトと進捗状況</p>
        </section>

        <section class="projects-section" id="projects-list">
            <p class="loading">読み込み中...</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 My Home. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/main.js"></script>
    <script>
        (async () => {
            const list = document.getElementById('projects-list');
            const { data: projects, error } = await db
                .from('projects')
                .select('*')
                .order('updated_at', { ascending: false });

            if (error || !projects?.length) {
                list.innerHTML = '<p>プロジェクトがありません。</p>';
                return;
            }

            const statusLabel = { ongoing: '進行中', completed: '完了', paused: '一時停止' };
            const statusClass = { ongoing: 'status-ongoing', completed: 'status-completed', paused: 'status-paused' };

            list.innerHTML = projects.map(p => `
                <div class="project-card">
                    <div class="project-header">
                        <h2 class="project-name">${p.name}</h2>
                        <span class="project-status ${statusClass[p.status] || 'status-ongoing'}">
                            ${statusLabel[p.status] || p.status}
                        </span>
                    </div>
                    ${p.description ? `<p class="project-description">${p.description}</p>` : ''}
                    <div class="progress-wrapper">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${p.progress}%"></div>
                        </div>
                        <span class="progress-label">${p.progress}%</span>
                    </div>
                    <p class="project-updated">最終更新: ${formatDate(p.updated_at)}</p>
                </div>
            `).join('');
        })();
    </script>
</body>
</html>
