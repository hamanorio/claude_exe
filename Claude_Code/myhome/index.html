<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Home - ホーム</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="index.html">My Home</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">ホーム</a></li>
                <li><a href="about.html">自己紹介</a></li>
                <li><a href="blog.html">ブログ</a></li>
                <li><a href="projects.html">プロジェクト</a></li>
                <li><a href="contact.html">お問い合わせ</a></li>
            </ul>
            <button class="menu-toggle" aria-label="メニュー">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>ようこそ My Home へ</h1>
            <p>情報発信と学びの記録</p>
        </section>

        <section class="intro">
            <h2>このサイトについて</h2>
            <p>このサイトは、日々の学びや気づきを発信するための個人サイトです。<br>
            プログラミング、技術、その他興味のあることについて書いていきます。</p>
        </section>

        <section class="latest-posts">
            <h2>最新の記事</h2>
            <div id="latest-posts-grid" class="post-grid">
                <p class="loading">読み込み中...</p>
            </div>
            <a href="blog.html" class="view-all">すべての記事を見る →</a>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 My Home. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/main.js"></script>
    <script>
        (async () => {
            const grid = document.getElementById('latest-posts-grid');
            const { data: posts, error } = await db
                .from('posts')
                .select('id, title, date, summary')
                .order('date', { ascending: false })
                .limit(3);

            if (error || !posts?.length) {
                grid.innerHTML = '<p>記事がありません。</p>';
                return;
            }

            grid.innerHTML = posts.map(post => `
                <article class="post-card">
                    <div class="post-date">${formatDate(post.date)}</div>
                    <h3><a href="blog/post.html#${post.id}">${post.title}</a></h3>
                    <p>${post.summary || ''}</p>
                    <a href="blog/post.html#${post.id}" class="read-more">続きを読む →</a>
                </article>
            `).join('');
        })();
    </script>
</body>
</html>
